version: '3.8'

services:
  todo-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-app-dev
    stdin_open: true
    tty: true
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('fs').accessSync('./src/app.js')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge
